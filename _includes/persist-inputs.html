<script>
// Persist lab observation inputs (class="persist") in this browser's localStorage,
// so values entered during the lab are still there in the evening for the Canvas quiz.
document.addEventListener("DOMContentLoaded", function () {
  const prefix = "labinput:" + location.pathname + ":";
  document.querySelectorAll("input.persist").forEach(function (el) {
    if (el.type === "radio") {
      const key = prefix + el.name;
      if (localStorage.getItem(key) === el.value) el.checked = true;
      el.addEventListener("change", function () {
        if (el.checked) localStorage.setItem(key, el.value);
      });
    } else if (el.type === "checkbox") {
      const key = prefix + el.id;
      el.checked = localStorage.getItem(key) === "1";
      el.addEventListener("change", function () {
        localStorage.setItem(key, el.checked ? "1" : "0");
      });
    } else {
      const key = prefix + el.id;
      const saved = localStorage.getItem(key);
      if (saved !== null) el.value = saved;
      el.addEventListener("input", function () {
        localStorage.setItem(key, el.value);
      });
    }
  });
});
</script>
